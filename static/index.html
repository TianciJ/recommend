<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieLens 推荐系统</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --primary: #6c8fff;
      --primary-dim: #3a4f99;
      --text: #e2e6f0;
      --text-dim: #7a80a0;
      --cold: #f59e0b;
      --cold-bg: #2a1f08;
      --error: #f87171;
      --error-bg: #2a1010;
      --success: #4ade80;
      --genre-colors: #6c8fff, #a78bfa, #34d399, #fb923c, #f472b6, #60a5fa, #facc15;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
    .logo span { color: var(--primary); }
    .mysql-badge {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .mysql-badge.on  { background: #0d2a1a; color: var(--success); border: 1px solid #1a5c30; }
    .mysql-badge.off { background: #1a1a2a; color: var(--text-dim); border: 1px solid var(--border); }

    /* ── Main ── */
    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── Control row ── */
    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      margin-bottom: 28px;
      align-items: start;
    }
    @media (max-width: 700px) { .controls { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card h2 { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px; }

    /* ── Form inputs ── */
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 0.78rem; color: var(--text-dim); }
    input[type=number], input[type=text] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 0.9rem;
      width: 120px;
      outline: none;
      transition: border-color .15s;
    }
    input[type=text] { width: 140px; }
    input:focus { border-color: var(--primary); }
    input.wide { width: 160px; }

    .btn {
      padding: 9px 20px;
      border-radius: 7px;
      border: none;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    #register-card { display: none; min-width: 260px; }

    /* ── Status bar ── */
    #status-bar {
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 24px;
      display: none;
    }
    #status-bar.info    { background: #0d1a2e; border: 1px solid var(--primary-dim); color: var(--primary); }
    #status-bar.error   { background: var(--error-bg); border: 1px solid #5c2020; color: var(--error); }
    #status-bar.cold    { background: var(--cold-bg); border: 1px solid #7a4a00; color: var(--cold); }
    #status-bar.success { background: #0d2a1a; border: 1px solid #1a5c30; color: var(--success); }

    /* ── Result meta ── */
    #result-meta {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 16px;
      display: none;
    }

    /* ── Movie grid ── */
    #movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    /* ── Movie card ── */
    .movie-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      transition: border-color .15s, transform .15s;
    }
    .movie-card:hover { border-color: var(--primary-dim); transform: translateY(-2px); }

    .card-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .rank {
      font-size: 0.72rem;
      color: var(--text-dim);
      font-weight: 600;
      min-width: 24px;
    }
    .genre-badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }
    .cold-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--cold-bg);
      color: var(--cold);
      border: 1px solid #7a4a00;
      margin-left: auto;
    }

    .movie-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 12px;
      min-height: 38px;
    }

    .scores { display: flex; flex-direction: column; gap: 5px; }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
    }
    .score-label { color: var(--text-dim); }
    .score-value { font-weight: 600; font-variant-numeric: tabular-nums; }
    .score-bar-wrap {
      width: 100%;
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      margin-top: 2px;
    }
    .score-bar { height: 3px; border-radius: 2px; transition: width .3s ease; }

    .source-label { font-size: 0.72rem; color: var(--text-dim); margin-top: 4px; font-style: italic; }

    /* ── Star rating ── */
    .star-row {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .star-row .star-label { font-size: 0.72rem; color: var(--text-dim); margin-right: 4px; }
    .star {
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--border);
      transition: color .1s, transform .1s;
      line-height: 1;
    }
    .star:hover, .star.active { color: #facc15; }
    .star:hover { transform: scale(1.2); }
    .star-done { font-size: 0.72rem; color: var(--success); margin-left: 4px; }

    /* spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">🎬 <span>MovieLens</span> 推荐系统</div>
  <div id="mysql-status" class="mysql-badge off">MySQL 未连接</div>
</header>

<main>
  <div class="controls">
    <!-- 推荐表单 -->
    <div class="card">
      <h2>推荐查询</h2>
      <div class="form-row" style="gap:12px; align-items:flex-end;">
        <div class="form-group">
          <label>User ID</label>
          <input id="user-id" type="number" min="1" value="15" class="wide">
        </div>
        <div class="form-group">
          <label>Top K</label>
          <input id="top-k" type="number" min="1" max="100" value="20">
        </div>
        <div class="form-group" id="age-group" style="display:none;">
          <label>年龄（冷启动）</label>
          <input id="age" type="number" min="1" max="120" placeholder="可选">
        </div>
        <div class="form-group" id="occupation-group" style="display:none;">
          <label>职业 0-20（冷启动）</label>
          <input id="occupation" type="number" min="0" max="20" placeholder="可选">
        </div>
        <button class="btn btn-primary" id="recommend-btn" onclick="doRecommend()">推荐</button>
      </div>
    </div>

    <!-- 注册表单（MySQL 可用时显示） -->
    <div class="card" id="register-card">
      <h2>注册新用户</h2>
      <div class="form-row" style="gap:10px; align-items:flex-end; flex-direction:column;">
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
          <div class="form-group">
            <label>用户名</label>
            <input id="reg-username" type="text" placeholder="alice">
          </div>
          <div class="form-group">
            <label>年龄</label>
            <input id="reg-age" type="number" min="1" max="120">
          </div>
          <div class="form-group">
            <label>职业 (0-20)</label>
            <input id="reg-occupation" type="number" min="0" max="20">
          </div>
          <button class="btn btn-secondary" id="register-btn" onclick="doRegister()">注册</button>
        </div>
        <div id="reg-result" style="font-size:0.78rem; color:var(--text-dim); width:100%;"></div>
      </div>
    </div>
  </div>

  <!-- 重训区（MySQL 可用时显示） -->
  <div id="retrain-row" style="display:none; margin-bottom:20px; display:none;">
    <div class="card" style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
      <div style="flex:1; min-width:200px;">
        <div style="font-size:0.85rem; font-weight:600; margin-bottom:4px;">重新训练模型</div>
        <div style="font-size:0.78rem; color:var(--text-dim);">将用 MySQL 中最新评分重训三个模型，完成后自动热更新，无需重启服务。约需 10-20 分钟。</div>
      </div>
      <div style="display:flex; align-items:center; gap:12px;">
        <span id="retrain-status-text" style="font-size:0.8rem; color:var(--text-dim);"></span>
        <button class="btn btn-secondary" id="retrain-btn" onclick="doRetrain()">开始训练</button>
      </div>
    </div>
  </div>

  <!-- 状态栏 -->
  <div id="status-bar"></div>

  <!-- 结果摘要 -->
  <div id="result-meta"></div>

  <!-- 电影卡片网格 -->
  <div id="movie-grid"></div>
</main>

<script>
  // ── 颜色表（genre → 色调） ──
  const GENRE_COLORS = {
    'Action':    ['#1e3a5f','#6c8fff'],
    'Adventure': ['#1e3a5f','#60a5fa'],
    'Animation': ['#2a1a3e','#a78bfa'],
    'Children':  ['#2a1a3e','#c084fc'],
    "Children's":['#2a1a3e','#c084fc'],
    'Comedy':    ['#1a3020','#4ade80'],
    'Crime':     ['#2a1210','#f87171'],
    'Documentary':['#1a2a1a','#86efac'],
    'Drama':     ['#1a1a30','#818cf8'],
    'Fantasy':   ['#2a1a3e','#e879f9'],
    'Film-Noir': ['#1a1a1a','#94a3b8'],
    'Horror':    ['#2a0a0a','#fca5a5'],
    'Musical':   ['#2a1020','#f9a8d4'],
    'Mystery':   ['#1a1a30','#a5b4fc'],
    'Romance':   ['#2a1020','#f472b6'],
    'Sci-Fi':    ['#0a1a2a','#38bdf8'],
    'Thriller':  ['#2a1010','#fb923c'],
    'War':       ['#1a1a10','#fde047'],
    'Western':   ['#2a1810','#fdba74'],
  };

  const COLD_SOURCE_LABELS = {
    'age_occupation': '年龄 + 职业分群',
    'age': '年龄分群',
    'occupation': '职业分群',
    'global': '全局热门',
  };

  // ── 页面初始化 ──
  async function init() {
    try {
      const res = await fetch('/api/status');
      const data = await res.json();
      window._mysqlAvailable = data.mysql_available;
      const badge = document.getElementById('mysql-status');
      if (data.mysql_available) {
        badge.textContent = 'MySQL 已连接';
        badge.className = 'mysql-badge on';
        document.getElementById('register-card').style.display = 'block';
        document.getElementById('retrain-row').style.display = 'block';
        pollRetrainStatus();
      } else {
        // 无 MySQL 时显示冷启动辅助字段
        document.getElementById('age-group').style.display = 'flex';
        document.getElementById('occupation-group').style.display = 'flex';
      }
    } catch (e) {
      setStatus('error', '无法连接到后端服务，请确认已启动 server.py');
    }
  }

  // ── 推荐 ──
  async function doRecommend() {
    const userId = parseInt(document.getElementById('user-id').value);
    if (!userId || userId < 1) { setStatus('error', '请输入有效的 User ID'); return; }

    const btn = document.getElementById('recommend-btn');
    btn.disabled = true;
    clearResults();
    setStatus('info', '<span class="spinner"></span>推荐中，请稍候...');

    const body = {
      user_id: userId,
      top_k: parseInt(document.getElementById('top-k').value) || 20,
    };
    const age = document.getElementById('age').value;
    const occ = document.getElementById('occupation').value;
    if (age) body.age = parseInt(age);
    if (occ) body.occupation = parseInt(occ);

    try {
      const res = await fetch('/api/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) { setStatus('error', data.detail || '请求失败'); return; }
      if (!data.items || data.items.length === 0) {
        setStatus('error', `用户 ${userId} 暂无推荐结果`);
        return;
      }
      renderResults(data);
    } catch (e) {
      setStatus('error', '请求失败，请检查后端服务是否正常运行');
    } finally {
      btn.disabled = false;
    }
  }

  // ── 注册 ──
  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const age = parseInt(document.getElementById('reg-age').value);
    const occupation = parseInt(document.getElementById('reg-occupation').value);
    if (!username) { showRegResult('请填写用户名', 'error'); return; }
    if (!age || age < 1) { showRegResult('请填写有效年龄', 'error'); return; }
    if (isNaN(occupation) || occupation < 0 || occupation > 20) {
      showRegResult('职业编码需在 0-20 之间', 'error'); return;
    }

    const btn = document.getElementById('register-btn');
    btn.disabled = true;
    showRegResult('注册中...', 'loading');

    try {
      const res = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, age, occupation }),
      });
      const data = await res.json();
      if (!res.ok) { showRegResult(data.detail || '注册失败', 'error'); return; }
      showRegResult(`✓ 注册成功！user_id = ${data.user_id}`, 'success');
      document.getElementById('user-id').value = data.user_id;
    } catch (e) {
      showRegResult('注册失败，请检查后端服务', 'error');
    } finally {
      btn.disabled = false;
    }
  }

  function showRegResult(msg, type) {
    const el = document.getElementById('reg-result');
    const colors = { error: 'var(--error)', success: 'var(--success)', loading: 'var(--text-dim)' };
    el.style.color = colors[type] || 'var(--text-dim)';
    el.innerHTML = msg;
  }

  // ── 渲染推荐结果 ──
  function renderResults(data) {
    if (data.is_cold_start) {
      setStatus('cold', `⚠️  冷启动模式 — 用户 ${data.user_id} 不在训练集中，基于人群偏好推荐`);
    } else {
      hideStatus();
    }

    const meta = document.getElementById('result-meta');
    meta.style.display = 'block';
    meta.textContent = `用户 ${data.user_id} 的推荐结果（共 ${data.count} 部）`;

    const grid = document.getElementById('movie-grid');
    grid.innerHTML = '';
    data.items.forEach(item => grid.appendChild(buildMovieCard(item, data.is_cold_start)));
  }

  function buildMovieCard(item, isColdStart) {
    const [bgColor, lineColor] = GENRE_COLORS[item.genre] || ['#1a1a30','#818cf8'];

    const card = document.createElement('div');
    card.className = 'movie-card';
    card.style.borderColor = bgColor;

    // ── 顶部：rank + genre badge（+ cold badge） ──
    const top = document.createElement('div');
    top.className = 'card-top';

    const rank = document.createElement('span');
    rank.className = 'rank';
    rank.textContent = `#${item.rank}`;
    top.appendChild(rank);

    if (item.genre) {
      const badge = document.createElement('span');
      badge.className = 'genre-badge';
      badge.style.background = bgColor;
      badge.style.color = lineColor;
      badge.textContent = item.genre;
      top.appendChild(badge);
    }

    if (isColdStart) {
      const coldBadge = document.createElement('span');
      coldBadge.className = 'cold-badge';
      coldBadge.textContent = 'COLD';
      top.appendChild(coldBadge);
    }

    card.appendChild(top);

    // ── 标题 ──
    const title = document.createElement('div');
    title.className = 'movie-title';
    title.textContent = item.title || `Movie ${item.movie_id}`;
    card.appendChild(title);

    // ── 分数区 ──
    const scores = document.createElement('div');
    scores.className = 'scores';

    if (isColdStart) {
      addScoreRow(scores, '冷启动分', item.cold_start_score, lineColor, 1);
      if (item.cold_start_source) {
        const src = document.createElement('div');
        src.className = 'source-label';
        src.textContent = COLD_SOURCE_LABELS[item.cold_start_source] || item.cold_start_source;
        scores.appendChild(src);
      }
    } else {
      if (item.recall_score != null)      addScoreRow(scores, 'Recall', item.recall_score, '#6c8fff', 1);
      if (item.rough_rank_score != null)  addScoreRow(scores, 'Rough',  item.rough_rank_score, '#a78bfa', 5);
      if (item.fine_rank_score != null)   addScoreRow(scores, 'Fine',   item.fine_rank_score,  lineColor, 1);
    }

    card.appendChild(scores);

    // ── 星级打分（MySQL 可用时显示） ──
    if (window._mysqlAvailable) {
      const starRow = document.createElement('div');
      starRow.className = 'star-row';

      const starLabel = document.createElement('span');
      starLabel.className = 'star-label';
      starLabel.textContent = '打分：';
      starRow.appendChild(starLabel);

      const stars = [];
      for (let i = 1; i <= 5; i++) {
        const s = document.createElement('span');
        s.className = 'star';
        s.textContent = '★';
        s.dataset.value = i;
        // 悬停时高亮 1..i
        s.addEventListener('mouseenter', () => stars.forEach((st, idx) => st.classList.toggle('active', idx < i)));
        s.addEventListener('mouseleave', () => {
          const cur = parseInt(starRow.dataset.rated || '0');
          stars.forEach((st, idx) => st.classList.toggle('active', idx < cur));
        });
        s.addEventListener('click', () => submitRating(item.movie_id, i, starRow, stars));
        stars.push(s);
        starRow.appendChild(s);
      }

      const doneTip = document.createElement('span');
      doneTip.className = 'star-done';
      doneTip.style.display = 'none';
      starRow.appendChild(doneTip);

      card.appendChild(starRow);
    }

    return card;
  }

  function addScoreRow(container, label, value, color, maxVal) {
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `<span class="score-label">${label}</span><span class="score-value" style="color:${color}">${typeof value === 'number' ? value.toFixed(4) : '—'}</span>`;
    container.appendChild(row);

    if (typeof value === 'number') {
      const wrap = document.createElement('div');
      wrap.className = 'score-bar-wrap';
      const bar = document.createElement('div');
      bar.className = 'score-bar';
      bar.style.background = color;
      bar.style.width = Math.min(Math.max(value / maxVal, 0), 1) * 100 + '%';
      wrap.appendChild(bar);
      container.appendChild(wrap);
    }
  }

  // ── 重新训练 ──
  let _retrainPollTimer = null;

  async function doRetrain() {
    const btn = document.getElementById('retrain-btn');
    btn.disabled = true;
    setRetrainText('<span class="spinner"></span>提交训练请求...');
    try {
      const res = await fetch('/api/retrain', { method: 'POST' });
      const data = await res.json();
      if (data.status === 'started' || data.status === 'running') {
        setRetrainText('<span class="spinner"></span>训练中，请耐心等待...');
        pollRetrainStatus(true);
      } else {
        setRetrainText(data.message || '');
        btn.disabled = false;
      }
    } catch {
      setRetrainText('请求失败');
      btn.disabled = false;
    }
  }

  function pollRetrainStatus(immediate = false) {
    if (_retrainPollTimer) clearInterval(_retrainPollTimer);
    const check = async () => {
      try {
        const res = await fetch('/api/retrain/status');
        const data = await res.json();
        const btn = document.getElementById('retrain-btn');
        if (data.running) {
          setRetrainText('<span class="spinner"></span>训练中，请耐心等待...');
          btn.disabled = true;
        } else {
          clearInterval(_retrainPollTimer);
          btn.disabled = false;
          if (data.last_result) {
            const color = data.last_result.success ? 'var(--success)' : 'var(--error)';
            setRetrainText(`<span style="color:${color}">${data.last_result.message}</span>`);
          } else {
            setRetrainText('');
          }
        }
      } catch { clearInterval(_retrainPollTimer); }
    };
    if (immediate) check();
    _retrainPollTimer = setInterval(check, 5000);
  }

  function setRetrainText(html) {
    document.getElementById('retrain-status-text').innerHTML = html;
  }

  // ── 提交打分 ──
  async function submitRating(movieId, rating, starRow, stars) {
    const userId = parseInt(document.getElementById('user-id').value);
    if (!userId || userId < 1) { setStatus('error', '请先输入 User ID 再打分'); return; }

    // 立即反馈：高亮已选星数
    starRow.dataset.rated = rating;
    stars.forEach((s, idx) => s.classList.toggle('active', idx < rating));
    stars.forEach(s => s.style.pointerEvents = 'none');

    try {
      const res = await fetch('/api/ratings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, movie_id: movieId, rating }),
      });
      const doneTip = starRow.querySelector('.star-done');
      if (res.ok) {
        doneTip.textContent = '✓ 已记录';
        doneTip.style.display = 'inline';
      } else {
        doneTip.textContent = '✗ 失败';
        doneTip.style.color = 'var(--error)';
        doneTip.style.display = 'inline';
        stars.forEach(s => s.style.pointerEvents = '');
      }
    } catch {
      stars.forEach(s => s.style.pointerEvents = '');
    }
  }

  // ── 工具 ──
  function setStatus(type, msg) {
    const el = document.getElementById('status-bar');
    el.className = type;
    el.style.display = 'block';
    el.innerHTML = msg;
  }
  function hideStatus() {
    const el = document.getElementById('status-bar');
    el.style.display = 'none';
  }
  function clearResults() {
    document.getElementById('movie-grid').innerHTML = '';
    document.getElementById('result-meta').style.display = 'none';
    hideStatus();
  }

  // Enter 键触发推荐
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.closest('main')) doRecommend();
  });

  init();
</script>
</body>
</html>
