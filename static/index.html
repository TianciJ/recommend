<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieLens 推荐系统</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --primary: #6c8fff;
      --primary-dim: #3a4f99;
      --text: #e2e6f0;
      --text-dim: #7a80a0;
      --cold: #f59e0b;
      --cold-bg: #2a1f08;
      --error: #f87171;
      --error-bg: #2a1010;
      --success: #4ade80;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Auth page ── */
    #auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-box {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
    }
    .auth-logo {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .auth-logo span { color: var(--primary); }
    .auth-subtitle {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 28px;
    }
    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-dim);
      transition: background .15s, color .15s;
    }
    .auth-tab.active { background: var(--surface); color: var(--text); }

    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form label { font-size: 0.78rem; color: var(--text-dim); display: block; margin-bottom: 5px; }
    .auth-form input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .15s;
    }
    .auth-form input:focus { border-color: var(--primary); }
    .auth-form .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .auth-form .occ-hint { font-size: 0.72rem; color: var(--text-dim); margin-top: 3px; }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      text-align: center;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; width: 100%; padding: 12px; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-sm { padding: 7px 14px; font-size: 0.82rem; }

    .auth-msg {
      font-size: 0.82rem;
      padding: 10px 14px;
      border-radius: 7px;
      display: none;
    }
    .auth-msg.error   { background: var(--error-bg); color: var(--error); border: 1px solid #5c2020; display: block; }
    .auth-msg.success { background: #0d2a1a; color: var(--success); border: 1px solid #1a5c30; display: block; }

    /* ── Guest mode note ── */
    .guest-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0 6px;
      color: var(--text-dim);
      font-size: 0.75rem;
    }
    .guest-divider::before, .guest-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .guest-note { font-size: 0.78rem; color: var(--text-dim); text-align: center; }
    .guest-note a { color: var(--primary); cursor: pointer; text-decoration: none; }
    .guest-note a:hover { text-decoration: underline; }

    /* ── App page ── */
    #app-page { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.3px; }
    .logo span { color: var(--primary); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-info { font-size: 0.82rem; color: var(--text-dim); }
    .user-info strong { color: var(--text); }

    main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .toolbar-left { display: flex; align-items: center; gap: 10px; flex: 1; }
    .topk-group { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--text-dim); }
    .topk-group input {
      width: 64px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 7px 10px;
      font-size: 0.85rem;
      outline: none;
    }
    .topk-group input:focus { border-color: var(--primary); }

    /* ── Retrain banner ── */
    #retrain-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      display: none;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    #retrain-banner .banner-text { flex: 1; min-width: 200px; }
    #retrain-banner .banner-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 2px; }
    #retrain-banner .banner-desc { font-size: 0.75rem; color: var(--text-dim); }

    /* ── Status bar ── */
    #status-bar {
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }
    #status-bar.info    { background: #0d1a2e; border: 1px solid var(--primary-dim); color: var(--primary); }
    #status-bar.error   { background: var(--error-bg); border: 1px solid #5c2020; color: var(--error); }
    #status-bar.cold    { background: var(--cold-bg); border: 1px solid #7a4a00; color: var(--cold); }

    #result-meta { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 16px; display: none; }

    /* ── Movie grid ── */
    #movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .movie-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      transition: border-color .15s, transform .15s;
    }
    .movie-card:hover { border-color: var(--primary-dim); transform: translateY(-2px); }

    .card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .rank { font-size: 0.72rem; color: var(--text-dim); font-weight: 600; min-width: 24px; }
    .genre-badge {
      font-size: 0.68rem; font-weight: 600; padding: 2px 8px; border-radius: 20px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;
    }
    .cold-badge {
      font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
      background: var(--cold-bg); color: var(--cold); border: 1px solid #7a4a00; margin-left: auto;
    }
    .movie-title { font-size: 0.88rem; font-weight: 600; line-height: 1.35; margin-bottom: 12px; min-height: 38px; }

    .scores { display: flex; flex-direction: column; gap: 5px; }
    .score-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; }
    .score-label { color: var(--text-dim); }
    .score-value { font-weight: 600; font-variant-numeric: tabular-nums; }
    .score-bar-wrap { width: 100%; height: 3px; background: var(--surface2); border-radius: 2px; margin-top: 2px; }
    .score-bar { height: 3px; border-radius: 2px; transition: width .3s ease; }
    .source-label { font-size: 0.72rem; color: var(--text-dim); margin-top: 4px; font-style: italic; }

    .star-row {
      display: flex; align-items: center; gap: 3px;
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
    }
    .star-row .star-label { font-size: 0.72rem; color: var(--text-dim); margin-right: 4px; }
    .star { font-size: 1.1rem; cursor: pointer; color: var(--border); transition: color .1s, transform .1s; line-height: 1; }
    .star:hover, .star.active { color: #facc15; }
    .star:hover { transform: scale(1.2); }
    .star-done { font-size: 0.72rem; color: var(--success); margin-left: 4px; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ══════════════════ 登录/注册页 ══════════════════ -->
<div id="auth-page">
  <div class="auth-box">
    <div class="auth-logo">🎬 <span>MovieLens</span></div>
    <div class="auth-subtitle">个性化电影推荐系统</div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">登录</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">注册</div>
    </div>

    <!-- 登录表单 -->
    <div id="form-login" class="auth-form">
      <div>
        <label>用户名</label>
        <input id="login-username" type="text" placeholder="输入用户名" autocomplete="username">
      </div>
      <div id="login-msg" class="auth-msg"></div>
      <button class="btn btn-primary" onclick="doLogin()">登录</button>
    </div>

    <!-- 注册表单 -->
    <div id="form-register" class="auth-form" style="display:none;">
      <div>
        <label>用户名</label>
        <input id="reg-username" type="text" placeholder="起个用户名" autocomplete="username">
      </div>
      <div class="form-row-2">
        <div>
          <label>年龄</label>
          <input id="reg-age" type="number" min="1" max="120" placeholder="25">
        </div>
        <div>
          <label>职业代码 (0-20)</label>
          <input id="reg-occupation" type="number" min="0" max="20" placeholder="4">
          <div class="occ-hint">0=其他 1=学术 4=大学生 7=行政</div>
        </div>
      </div>
      <div id="reg-msg" class="auth-msg"></div>
      <button class="btn btn-primary" onclick="doRegister()">注册并登录</button>
    </div>

    <!-- 无 MySQL 时的游客模式 -->
    <div id="guest-section" style="display:none;">
      <div class="guest-divider">或</div>
      <div class="guest-note">
        MySQL 未连接，可以<a onclick="doGuestLogin()">以游客身份浏览</a>（user_id 1-6040）
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════ 主应用页 ══════════════════ -->
<div id="app-page">
  <header>
    <div class="logo">🎬 <span>MovieLens</span> 推荐系统</div>
    <div class="header-right">
      <div class="user-info" id="header-user"></div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">退出</button>
    </div>
  </header>

  <main>
    <!-- 重训 banner -->
    <div id="retrain-banner">
      <div class="banner-text">
        <div class="banner-title">重新训练模型</div>
        <div class="banner-desc">用 MySQL 最新评分重训三个模型，完成后自动热更新，无需重启服务。约需 10-20 分钟。</div>
      </div>
      <span id="retrain-status-text" style="font-size:0.8rem; color:var(--text-dim);"></span>
      <button class="btn btn-secondary btn-sm" id="retrain-btn" onclick="doRetrain()">开始训练</button>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-primary btn-sm" id="recommend-btn" onclick="doRecommend()">
          获取推荐
        </button>
        <div class="topk-group">
          <span>推荐数量</span>
          <input id="top-k" type="number" min="1" max="100" value="20">
        </div>
      </div>
    </div>

    <div id="status-bar"></div>
    <div id="result-meta"></div>
    <div id="movie-grid"></div>
  </main>
</div>

<script>
  // ══════════════════ 常量 ══════════════════
  const GENRE_COLORS = {
    'Action':     ['#1e3a5f','#6c8fff'], 'Adventure':  ['#1e3a5f','#60a5fa'],
    'Animation':  ['#2a1a3e','#a78bfa'], 'Children':   ['#2a1a3e','#c084fc'],
    "Children's": ['#2a1a3e','#c084fc'], 'Comedy':     ['#1a3020','#4ade80'],
    'Crime':      ['#2a1210','#f87171'], 'Documentary':['#1a2a1a','#86efac'],
    'Drama':      ['#1a1a30','#818cf8'], 'Fantasy':    ['#2a1a3e','#e879f9'],
    'Film-Noir':  ['#1a1a1a','#94a3b8'], 'Horror':     ['#2a0a0a','#fca5a5'],
    'Musical':    ['#2a1020','#f9a8d4'], 'Mystery':    ['#1a1a30','#a5b4fc'],
    'Romance':    ['#2a1020','#f472b6'], 'Sci-Fi':     ['#0a1a2a','#38bdf8'],
    'Thriller':   ['#2a1010','#fb923c'], 'War':        ['#1a1a10','#fde047'],
    'Western':    ['#2a1810','#fdba74'],
  };
  const COLD_SOURCE_LABELS = {
    'age_occupation': '年龄 + 职业分群', 'age': '年龄分群',
    'occupation': '职业分群', 'global': '全局热门',
  };

  // ══════════════════ 状态 ══════════════════
  let _session = null;      // { userId, username, isGuest }
  let _mysqlAvailable = false;
  let _retrainPollTimer = null;

  // ══════════════════ 初始化 ══════════════════
  async function init() {
    // 检查后端状态
    try {
      const res = await fetch('/api/status');
      const data = await res.json();
      _mysqlAvailable = data.mysql_available;
    } catch {
      // 后端未启动，保持 auth page
      showAuthMsg('login', '无法连接到后端服务，请确认已启动 server.py', 'error');
      return;
    }

    if (!_mysqlAvailable) {
      document.getElementById('guest-section').style.display = 'block';
      // 禁用注册/登录表单
      document.getElementById('tab-register').style.display = 'none';
      document.getElementById('login-username').placeholder = '无 MySQL，请使用游客模式';
      document.getElementById('login-username').disabled = true;
      document.querySelectorAll('#form-login .btn-primary').forEach(b => b.disabled = true);
      return;
    }

    // 检查本地是否有登录态
    const saved = localStorage.getItem('ml_session');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        // 验证 user_id 还在
        const r = await fetch(`/api/users/${s.userId}`);
        if (r.ok) { enterApp(s); return; }
      } catch {}
      localStorage.removeItem('ml_session');
    }

    showPage('auth');
  }

  // ══════════════════ 页面切换 ══════════════════
  function showPage(page) {
    document.getElementById('auth-page').style.display = page === 'auth' ? 'flex' : 'none';
    document.getElementById('app-page').style.display  = page === 'app'  ? 'block' : 'none';
  }

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display    = tab === 'login'    ? 'flex' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none';
  }

  function showAuthMsg(form, msg, type) {
    const el = document.getElementById(`${form}-msg`);
    el.className = `auth-msg ${type}`;
    el.textContent = msg;
  }

  // ══════════════════ 登录 ══════════════════
  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    if (!username) { showAuthMsg('login', '请输入用户名', 'error'); return; }

    showAuthMsg('login', '登录中...', '');
    try {
      const res = await fetch(`/api/users/by-username/${encodeURIComponent(username)}`);
      const data = await res.json();
      if (!res.ok) { showAuthMsg('login', data.detail || '用户名不存在', 'error'); return; }
      const session = { userId: data.user_id, username: data.username, isGuest: false };
      localStorage.setItem('ml_session', JSON.stringify(session));
      enterApp(session);
    } catch {
      showAuthMsg('login', '请求失败，请检查后端服务', 'error');
    }
  }

  // ══════════════════ 注册 ══════════════════
  async function doRegister() {
    const username   = document.getElementById('reg-username').value.trim();
    const age        = parseInt(document.getElementById('reg-age').value);
    const occupation = parseInt(document.getElementById('reg-occupation').value);
    if (!username)                                { showAuthMsg('reg', '请填写用户名', 'error'); return; }
    if (!age || age < 1)                          { showAuthMsg('reg', '请填写有效年龄', 'error'); return; }
    if (isNaN(occupation) || occupation < 0 || occupation > 20) {
      showAuthMsg('reg', '职业代码需在 0-20 之间', 'error'); return;
    }

    showAuthMsg('reg', '注册中...', '');
    try {
      const res = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, age, occupation }),
      });
      const data = await res.json();
      if (!res.ok) { showAuthMsg('reg', data.detail || '注册失败', 'error'); return; }
      const session = { userId: data.user_id, username: data.username, isGuest: false };
      localStorage.setItem('ml_session', JSON.stringify(session));
      enterApp(session);
    } catch {
      showAuthMsg('reg', '请求失败，请检查后端服务', 'error');
    }
  }

  // ══════════════════ 游客模式 ══════════════════
  function doGuestLogin() {
    const userId = Math.floor(Math.random() * 6040) + 1;
    const session = { userId, username: `游客 #${userId}`, isGuest: true };
    enterApp(session);
  }

  // ══════════════════ 进入主页 ══════════════════
  function enterApp(session) {
    _session = session;
    const userEl = document.getElementById('header-user');
    userEl.innerHTML = `<strong>${session.username}</strong>&nbsp; ID ${session.userId}`;

    // 显示重训 banner（登录用户 + MySQL）
    if (_mysqlAvailable && !session.isGuest) {
      document.getElementById('retrain-banner').style.display = 'flex';
      pollRetrainStatus();
    }

    showPage('app');
    doRecommend();
  }

  // ══════════════════ 退出 ══════════════════
  function doLogout() {
    _session = null;
    localStorage.removeItem('ml_session');
    clearResults();
    if (_retrainPollTimer) clearInterval(_retrainPollTimer);
    // 重置登录表单
    document.getElementById('login-username').value = '';
    document.getElementById('login-username').disabled = false;
    document.querySelectorAll('#form-login .btn-primary').forEach(b => b.disabled = false);
    document.getElementById('login-msg').className = 'auth-msg';
    switchTab('login');
    showPage('auth');
  }

  // ══════════════════ 推荐 ══════════════════
  async function doRecommend() {
    if (!_session) return;
    const btn = document.getElementById('recommend-btn');
    btn.disabled = true;
    clearResults();
    setStatus('info', '<span class="spinner"></span>推荐中，请稍候...');

    try {
      const res = await fetch('/api/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: _session.userId,
          top_k: parseInt(document.getElementById('top-k').value) || 20,
        }),
      });
      const data = await res.json();
      if (res.status === 404) { setStatus('error', `❌ ${data.detail}`); return; }
      if (!res.ok) { setStatus('error', data.detail || '请求失败'); return; }
      if (!data.items || data.items.length === 0) { setStatus('error', '暂无推荐结果'); return; }
      renderResults(data);
    } catch {
      setStatus('error', '请求失败，请检查后端服务是否正常运行');
    } finally {
      btn.disabled = false;
    }
  }

  // ══════════════════ 渲染结果 ══════════════════
  function renderResults(data) {
    if (data.is_cold_start) {
      setStatus('cold', `⚠️  冷启动模式 — 你还不在训练集中，基于同类人群偏好推荐`);
    } else {
      hideStatus();
    }

    const meta = document.getElementById('result-meta');
    meta.style.display = 'block';
    meta.textContent = `为你推荐 ${data.count} 部电影`;

    const grid = document.getElementById('movie-grid');
    grid.innerHTML = '';
    data.items.forEach(item => grid.appendChild(buildMovieCard(item, data.is_cold_start)));
  }

  function buildMovieCard(item, isColdStart) {
    const [bgColor, lineColor] = GENRE_COLORS[item.genre] || ['#1a1a30','#818cf8'];
    const card = document.createElement('div');
    card.className = 'movie-card';
    card.style.borderColor = bgColor;

    // 顶部
    const top = document.createElement('div');
    top.className = 'card-top';
    const rank = document.createElement('span');
    rank.className = 'rank';
    rank.textContent = `#${item.rank}`;
    top.appendChild(rank);
    if (item.genre) {
      const badge = document.createElement('span');
      badge.className = 'genre-badge';
      badge.style.background = bgColor;
      badge.style.color = lineColor;
      badge.textContent = item.genre;
      top.appendChild(badge);
    }
    if (isColdStart) {
      const cb = document.createElement('span');
      cb.className = 'cold-badge';
      cb.textContent = 'COLD';
      top.appendChild(cb);
    }
    card.appendChild(top);

    // 标题
    const title = document.createElement('div');
    title.className = 'movie-title';
    title.textContent = item.title || `Movie ${item.movie_id}`;
    card.appendChild(title);

    // 分数
    const scores = document.createElement('div');
    scores.className = 'scores';
    if (isColdStart) {
      addScoreRow(scores, '冷启动分', item.cold_start_score, lineColor, 1);
      if (item.cold_start_source) {
        const src = document.createElement('div');
        src.className = 'source-label';
        src.textContent = COLD_SOURCE_LABELS[item.cold_start_source] || item.cold_start_source;
        scores.appendChild(src);
      }
    } else {
      if (item.recall_score     != null) addScoreRow(scores, 'Recall', item.recall_score,     '#6c8fff', 1);
      if (item.rough_rank_score != null) addScoreRow(scores, 'Rough',  item.rough_rank_score,  '#a78bfa', 5);
      if (item.fine_rank_score  != null) addScoreRow(scores, 'Fine',   item.fine_rank_score,   lineColor, 1);
    }
    card.appendChild(scores);

    // 星级打分
    if (_mysqlAvailable && _session && !_session.isGuest) {
      const starRow = document.createElement('div');
      starRow.className = 'star-row';
      const starLabel = document.createElement('span');
      starLabel.className = 'star-label';
      starLabel.textContent = '打分：';
      starRow.appendChild(starLabel);
      const stars = [];
      for (let i = 1; i <= 5; i++) {
        const s = document.createElement('span');
        s.className = 'star';
        s.textContent = '★';
        s.addEventListener('mouseenter', () => stars.forEach((st, idx) => st.classList.toggle('active', idx < i)));
        s.addEventListener('mouseleave', () => {
          const cur = parseInt(starRow.dataset.rated || '0');
          stars.forEach((st, idx) => st.classList.toggle('active', idx < cur));
        });
        s.addEventListener('click', () => submitRating(item.movie_id, i, starRow, stars));
        stars.push(s);
        starRow.appendChild(s);
      }
      const doneTip = document.createElement('span');
      doneTip.className = 'star-done';
      doneTip.style.display = 'none';
      starRow.appendChild(doneTip);
      card.appendChild(starRow);
    }

    return card;
  }

  function addScoreRow(container, label, value, color, maxVal) {
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `<span class="score-label">${label}</span><span class="score-value" style="color:${color}">${typeof value === 'number' ? value.toFixed(4) : '—'}</span>`;
    container.appendChild(row);
    if (typeof value === 'number') {
      const wrap = document.createElement('div');
      wrap.className = 'score-bar-wrap';
      const bar = document.createElement('div');
      bar.className = 'score-bar';
      bar.style.background = color;
      bar.style.width = Math.min(Math.max(value / maxVal, 0), 1) * 100 + '%';
      wrap.appendChild(bar);
      container.appendChild(wrap);
    }
  }

  // ══════════════════ 打分 ══════════════════
  async function submitRating(movieId, rating, starRow, stars) {
    starRow.dataset.rated = rating;
    stars.forEach((s, idx) => s.classList.toggle('active', idx < rating));
    stars.forEach(s => s.style.pointerEvents = 'none');

    try {
      const res = await fetch('/api/ratings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: _session.userId, movie_id: movieId, rating }),
      });
      const doneTip = starRow.querySelector('.star-done');
      if (res.ok) {
        doneTip.textContent = '✓ 已记录';
        doneTip.style.display = 'inline';
      } else {
        doneTip.textContent = '✗ 失败';
        doneTip.style.color = 'var(--error)';
        doneTip.style.display = 'inline';
        stars.forEach(s => s.style.pointerEvents = '');
      }
    } catch {
      stars.forEach(s => s.style.pointerEvents = '');
    }
  }

  // ══════════════════ 重训 ══════════════════
  async function doRetrain() {
    const btn = document.getElementById('retrain-btn');
    btn.disabled = true;
    setRetrainText('<span class="spinner"></span>提交训练请求...');
    try {
      const res = await fetch('/api/retrain', { method: 'POST' });
      const data = await res.json();
      if (data.status === 'started' || data.status === 'running') {
        setRetrainText('<span class="spinner"></span>训练中，请耐心等待...');
        pollRetrainStatus(true);
      } else {
        setRetrainText(data.message || '');
        btn.disabled = false;
      }
    } catch {
      setRetrainText('请求失败');
      btn.disabled = false;
    }
  }

  function pollRetrainStatus(immediate = false) {
    if (_retrainPollTimer) clearInterval(_retrainPollTimer);
    const check = async () => {
      try {
        const res = await fetch('/api/retrain/status');
        const data = await res.json();
        const btn = document.getElementById('retrain-btn');
        if (data.running) {
          setRetrainText('<span class="spinner"></span>训练中，请耐心等待...');
          btn.disabled = true;
        } else {
          clearInterval(_retrainPollTimer);
          btn.disabled = false;
          if (data.last_result) {
            const color = data.last_result.success ? 'var(--success)' : 'var(--error)';
            setRetrainText(`<span style="color:${color}">${data.last_result.message}</span>`);
          } else {
            setRetrainText('');
          }
        }
      } catch { clearInterval(_retrainPollTimer); }
    };
    if (immediate) check();
    _retrainPollTimer = setInterval(check, 5000);
  }

  function setRetrainText(html) {
    document.getElementById('retrain-status-text').innerHTML = html;
  }

  // ══════════════════ 工具 ══════════════════
  function setStatus(type, msg) {
    const el = document.getElementById('status-bar');
    el.className = type;
    el.style.display = 'block';
    el.innerHTML = msg;
  }
  function hideStatus() { document.getElementById('status-bar').style.display = 'none'; }
  function clearResults() {
    document.getElementById('movie-grid').innerHTML = '';
    document.getElementById('result-meta').style.display = 'none';
    hideStatus();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('auth-page').style.display !== 'none') {
        const tab = document.getElementById('tab-login').classList.contains('active') ? 'login' : 'register';
        tab === 'login' ? doLogin() : doRegister();
      }
    }
  });

  init();
</script>
</body>
</html>
